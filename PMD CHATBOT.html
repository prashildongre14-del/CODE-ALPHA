<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMD AI Chatbot (GPT Mode)</title>
  <!-- Plus Jakarta Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* -------------------------------------------------------------
       1. VARIABLES AND THEMES (ChatGPT Sleek Palette)
       ------------------------------------------------------------- */
    :root {
      /* Dark Theme (Default ChatGPT style) */
      --bg-color: #212121;
      --sidebar-bg: #171717;
      --sidebar-border: #2f2f2f;
      --sidebar-hover: #212121;
      --sidebar-text: #ececf1;
      --chat-bg: #212121;
      --text-main: #ececf1;
      --text-muted: #b4b4b4;
      --header-bg: #212121;
      --header-border: rgba(255, 255, 255, 0.05);
      
      --user-msg-bg: #2f2f2f;
      --user-msg-text: #ececf1;
      
      --bot-msg-bg: transparent;
      --bot-msg-text: #ececf1;
      
      --input-container-bg: #212121;
      --input-bg: #2f2f2f;
      --input-text: #ececf1;
      --input-border: rgba(255, 255, 255, 0.05);
      --input-focus-border: #424242;
      --input-shadow: rgba(0, 0, 0, 0.2);
      
      --card-bg: #2f2f2f;
      --card-border: #3f3f3f;
      --card-hover: #383838;
      --card-title: #ececf1;
      --card-desc: #b4b4b4;
      
      --btn-primary-bg: #ffffff;
      --btn-primary-text: #000000;
      --btn-hover: #e3e3e3;
      
      --btn-secondary-bg: #2f2f2f;
      --btn-secondary-text: #ececf1;
      
      --scrollbar-thumb: rgba(255, 255, 255, 0.1);
      --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
      
      --avatar-bot-bg: #10a37f; /* ChatGPT Green */
      --avatar-user-bg: #ab6cfb; /* User Purple */
      
      --cursor-color: #ececf1;
      --transition-speed: 0.3s;
    }

    :root[data-theme="light"] {
      /* Light Theme (Classic clean look) */
      --bg-color: #ffffff;
      --sidebar-bg: #f9f9f9;
      --sidebar-border: #e3e3e3;
      --sidebar-hover: #ececec;
      --sidebar-text: #0d0d0d;
      --chat-bg: #ffffff;
      --text-main: #0d0d0d;
      --text-muted: #676767;
      --header-bg: #ffffff;
      --header-border: rgba(0, 0, 0, 0.05);
      
      --user-msg-bg: #f4f4f4;
      --user-msg-text: #0d0d0d;
      
      --bot-msg-bg: transparent;
      --bot-msg-text: #0d0d0d;
      
      --input-container-bg: #ffffff;
      --input-bg: #f4f4f4;
      --input-text: #0d0d0d;
      --input-border: rgba(0, 0, 0, 0.05);
      --input-focus-border: #e3e3e3;
      --input-shadow: rgba(0, 0, 0, 0.05);
      
      --card-bg: #f9f9f9;
      --card-border: #e3e3e3;
      --card-hover: #ececec;
      --card-title: #0d0d0d;
      --card-desc: #676767;
      
      --btn-primary-bg: #0d0d0d;
      --btn-primary-text: #ffffff;
      --btn-hover: #2a2a2a;
      
      --btn-secondary-bg: #f4f4f4;
      --btn-secondary-text: #0d0d0d;
      
      --scrollbar-thumb: rgba(0, 0, 0, 0.1);
      --scrollbar-thumb-hover: rgba(0, 0, 0, 0.2);
      
      --avatar-bot-bg: #10a37f;
      --avatar-user-bg: #4f46e5;
      
      --cursor-color: #0d0d0d;
    }

    /* -------------------------------------------------------------
       2. GLOBAL RESET & BASE
       ------------------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
    }

    /* -------------------------------------------------------------
       3. SYSTEM LAYOUT (ChatGPT Split Screen)
       ------------------------------------------------------------- */
    .app-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Mobile Sidebar overlay backdrop */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    /* -------------------------------------------------------------
       4. SIDEBAR (Left Panel)
       ------------------------------------------------------------- */
    .sidebar {
      width: 260px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color var(--transition-speed) ease, border-color var(--transition-speed) ease;
    }

    .sidebar-header {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .new-chat-btn {
      flex: 1;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--sidebar-border);
      background: transparent;
      color: var(--sidebar-text);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .new-chat-btn:hover {
      background: var(--sidebar-hover);
    }

    .new-chat-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .mobile-close-btn {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--sidebar-border);
      background: transparent;
      color: var(--sidebar-text);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .mobile-close-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Sidebar History Items list */
    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-history::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-history::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    .history-group-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 12px 12px 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--sidebar-text);
      font-size: 13.5px;
      position: relative;
      transition: background-color 0.2s ease;
      group: hover;
    }

    .history-item.active {
      background-color: var(--sidebar-hover);
    }

    .history-item:hover {
      background-color: var(--sidebar-hover);
    }

    .history-item-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex: 1;
    }

    .history-item svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .history-item-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .history-item-input {
      background: transparent;
      border: 1px solid #10a37f;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 90%;
      border-radius: 4px;
      padding: 1px 4px;
    }

    .history-item-actions {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .history-item:hover .history-item-actions {
      display: flex;
    }

    .history-action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
    }

    .history-action-btn:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .history-action-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      stroke: none;
    }

    /* Sidebar Footer Settings Panel */
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-action-btn {
      height: 38px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--sidebar-text);
      font-size: 13px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s ease;
    }

    .footer-action-btn:hover {
      background: var(--sidebar-hover);
    }

    .footer-action-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .footer-toggles {
      display: flex;
      gap: 4px;
    }

    .footer-toggle-btn {
      flex: 1;
      height: 38px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--sidebar-text);
      font-size: 11.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .footer-toggle-btn:hover {
      background: var(--sidebar-hover);
    }

    .footer-toggle-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      margin-top: 4px;
      background: rgba(255, 255, 255, 0.02);
    }

    .user-avatar-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #10a37f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
    }

    .user-badge-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .badge-title {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-subtitle {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* -------------------------------------------------------------
       5. MAIN CHAT CONTAINER (Right Panel)
       ------------------------------------------------------------- */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--chat-bg);
      position: relative;
      transition: background-color var(--transition-speed) ease;
    }

    .chat-header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--header-border);
      background-color: var(--header-bg);
      flex-shrink: 0;
      transition: background-color var(--transition-speed) ease, border-color var(--transition-speed) ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-toggle-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      align-items: center;
      justify-content: center;
    }

    .menu-toggle-btn:hover {
      background-color: var(--input-bg);
    }

    .menu-toggle-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .active-chat-title {
      font-size: 14.5px;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      display: inline-block;
    }

    .online-text {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* -------------------------------------------------------------
       6. CHAT MESSAGES AREA
       ------------------------------------------------------------- */
    .chat-messages-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .chat-messages-container::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages-container::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
    }

    .chat-messages-container::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* -------------------------------------------------------------
       6.A. GPT EMPTY STATE (ChatGPT Welcome Grid)
       ------------------------------------------------------------- */
    .welcome-container {
      max-width: 720px;
      width: 90%;
      margin: auto;
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fade-in 0.4s ease forwards;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background-color: var(--avatar-bot-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px rgba(16, 163, 127, 0.2);
    }

    .welcome-logo svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 32px;
      text-align: center;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
    }

    .suggestion-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      text-align: left;
    }

    .suggestion-card:hover {
      background-color: var(--card-hover);
      border-color: var(--input-focus-border);
      transform: translateY(-1px);
    }

    .card-icon {
      color: #10a37f;
      display: flex;
      align-items: center;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .card-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--card-title);
    }

    .card-desc {
      font-size: 11.5px;
      color: var(--card-desc);
      line-height: 1.4;
    }

    /* -------------------------------------------------------------
       6.B. GPT CHAT THREAD MESSAGE ROW
       ------------------------------------------------------------- */
    .message-row {
      width: 100%;
      border-bottom: 1px solid var(--header-border);
      padding: 24px 0;
      display: flex;
      justify-content: center;
      animation: message-slide 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes message-slide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user-row {
      background-color: rgba(255, 255, 255, 0.01);
    }

    .message-row.bot-row {
      background-color: rgba(0, 0, 0, 0.02);
    }

    .message-row-inner {
      width: 720px;
      max-width: 90%;
      display: flex;
      gap: 18px;
    }

    /* GPT / User Circle Avatars */
    .avatar-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }

    .user-row .avatar-wrapper {
      background-color: var(--avatar-user-bg);
    }

    .bot-row .avatar-wrapper {
      background-color: var(--avatar-bot-bg);
    }

    .avatar-wrapper svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .message-content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-author {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-main);
    }

    .message-text {
      font-size: 14.5px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    /* Markdown styling inside messages */
    .message-text strong {
      font-weight: 600;
    }

    .message-text br {
      display: block;
      content: "";
      margin-top: 8px;
    }

    .message-text ul {
      margin-left: 20px;
      margin-top: 6px;
      margin-bottom: 6px;
    }

    .message-text li {
      margin-bottom: 4px;
    }

    .message-text code {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      background-color: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .message-row-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .message-timestamp {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Copier button next to bot answers */
    .message-copy-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s ease;
      opacity: 0;
    }

    .message-row:hover .message-copy-btn {
      opacity: 1;
    }

    .message-copy-btn:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .message-copy-btn svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* Typing indicator bounce dots */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 20px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background-color: var(--text-muted);
      border-radius: 50%;
      animation: typing-bounce 1.3s infinite ease-in-out;
      opacity: 0.6;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typing-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Streaming text terminal blinking cursor */
    .streaming-text::after {
      content: '▊';
      display: inline-block;
      margin-left: 2px;
      color: var(--cursor-color);
      animation: cursor-blink 0.8s infinite steps(2, start);
    }

    @keyframes cursor-blink {
      to { visibility: hidden; }
    }

    /* Interactive Quick reply chips for fallbacks inside stream response */
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip-btn {
      background: var(--chip-bg);
      color: var(--chip-text);
      border: 1px solid var(--chip-border);
      border-radius: 16px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip-btn:hover {
      background-color: var(--avatar-bot-bg);
      color: #fff;
      border-color: var(--avatar-bot-bg);
      transform: translateY(-1px);
    }

    /* -------------------------------------------------------------
       7. CHAT INPUT LAYOUT (ChatGPT Bottom Bar)
       ------------------------------------------------------------- */
    .chat-input-container {
      padding: 12px 24px 24px;
      background-color: var(--input-container-bg);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background-color var(--transition-speed) ease;
    }

    .input-inner {
      width: 720px;
      max-width: 90%;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 20px;
      padding: 8px 12px 8px 16px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      box-shadow: var(--input-shadow);
      transition: border-color var(--transition-speed) ease, background-color var(--transition-speed) ease;
      position: relative;
    }

    .input-inner:focus-within {
      border-color: var(--input-focus-border);
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--input-text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 200px;
      height: 24px;
      padding: 2px 0;
    }

    #chat-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background-color: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .send-btn:disabled {
      background-color: transparent;
      color: var(--text-muted);
      opacity: 0.25;
      cursor: not-allowed;

    // 3. Synonym Mapper (Query Expansion) to make matching robust
    const synonyms = {

    // 4. Basic Stemmer (Normalizing plurals, participles, etc.)
    function stem(word) {
      if (word.length <= 2) return word;
      
      // Remove Plurals
      if (word.endsWith('ies')) return word.slice(0, -3) + 'i';
      if (word.endsWith('es')) return word.slice(0, -2);
      if (word.endsWith('s') && !word.endsWith('ss') && !word.endsWith('us') && !word.endsWith('is')) {
        return word.slice(0, -1);
      }
      
      // Remove Participles & Gerunds ('ing', 'ed')
      if (word.endsWith('ing')) {
        let base = word.slice(0, -3);
        if (base.endsWith('pp') || base.endsWith('tt') || base.endsWith('nn') || base.endsWith('dd') || base.endsWith('gg') || base.endsWith('rr')) {
          return base.slice(0, -1);
        }
        return base;
      }
      
      if (word.endsWith('ed')) {
        let base = word.slice(0, -2);
        if (base.endsWith('pp') || base.endsWith('tt') || base.endsWith('nn') || base.endsWith('dd') || base.endsWith('gg') || base.endsWith('rr')) {
          return base.slice(0, -1);
        }
        return base;
      }
      
      // Remove common adverbs / suffix endings
      if (word.endsWith('ly')) return word.slice(0, -2);
      if (word.endsWith('ment')) return word.slice(0, -4);
      if (word.endsWith('able') || word.endsWith('ible')) return word.slice(0, -4);
      
      return word;
    }

    // 5. NLP Preprocessing: Lowercase, Punctuation removal, Tokenize, Stopwords, Stemming & Synonyms
    function preprocess(text) {
      let cleaned = text.toLowerCase();
      cleaned = cleaned.replace(/[^\w\s]/g, ' ');
      let tokens = cleaned.split(/\s+/).filter(word => word.length > 0);
      let filtered = tokens.filter(token => !stopwords.has(token));
      
      return filtered.map(token => {
        let stemmed = stem(token);
        return synonyms[stemmed] || stemmed;
      });
    }

    // 6. Precompute stored FAQs
    const faqTokens = faqs.map(faq => preprocess(faq.question));

    // 7. Jaccard Similarity Calculator
    function calculateJaccardSimilarity(tokens1, tokens2) {
      if (tokens1.length === 0 || tokens2.length === 0) return 0;
      
      const set1 = new Set(tokens1);
      const set2 = new Set(tokens2);
      
      let intersectionSize = 0;
      for (const t of set1) {
        if (set2.has(t)) {
          intersectionSize++;
        }
      }
      
      const unionSize = new Set([...tokens1, ...tokens2]).size;
      return intersectionSize / unionSize;
    }

    // 8. Find Best FAQ Match
    function findBestFAQ(userQuery) {
      const userTokens = preprocess(userQuery);
      if (userTokens.length === 0) return null;
      
      let bestIndex = -1;
      let highestSimilarity = 0;
      
      for (let i = 0; i < faqs.length; i++) {
        const similarity = calculateJaccardSimilarity(userTokens, faqTokens[i]);
        if (similarity > highestSimilarity) {
          highestSimilarity = similarity;
          bestIndex = i;
        }
      }
      
      // Match threshold: require at least 20% similarity to match
      const SIM_THRESHOLD = 0.20;
      if (highestSimilarity >= SIM_THRESHOLD) {
        return {
          faq: faqs[bestIndex],
          similarity: highestSimilarity
        };
      }
      return null;
    }

      const mathSymbols = /[0-9\+\-\*\/]/;
      if (mathSymbols.test(cleaned) && tokens.length <= 5) {

          const cleanMath = cleaned.replace(/[^0-9\+\-\*\/\(\)\. ]/g, '');

    // -------------------------------------------------------------
    // AUDIO EFFECTS ENGINE (Web Audio API Synthesizer)
    // -------------------------------------------------------------
    let audioCtx = null;
    let soundEnabled = true;

    if (localStorage.getItem('pmd_sound_enabled') !== null) {
      soundEnabled = localStorage.getItem('pmd_sound_enabled') === 'true';
    }

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSynthSound(type) {
      if (!soundEnabled) return;
      try {
        initAudioContext();
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        const now = audioCtx.currentTime;

          osc.type = 'sine';

          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'reply') {
          // Gentle warm bubble chime
          osc.type = 'sine';
          osc.frequency.setValueAtTime(520, now);
          osc.frequency.exponentialRampToValueAtTime(320, now + 0.15);
          gainNode.gain.setValueAtTime(0.1, now);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
          
          // Chime double-tap
          const osc2 = audioCtx.createOscillator();
          const gain2 = audioCtx.createGain();
          osc2.connect(gain2);
          gain2.connect(audioCtx.destination);
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(640, now + 0.06);
          osc2.frequency.exponentialRampToValueAtTime(400, now + 0.2);
          gain2.gain.setValueAtTime(0.07, now + 0.06);
          gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          osc2.start(now + 0.06);
          osc2.stop(now + 0.2);
        } else if (type === 'tap') {
          // Discrete click
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(300, now);
          gainNode.gain.setValueAtTime(0.04, now);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
        }
      } catch (e) {
        console.warn("Audio synthesis suspended / blocked by browser policy.", e);
      }
    }

    // -------------------------------------------------------------
    // CHAT ENGINE & LOCAL STORAGE PERSISTENCE (Multi-Chat System)
    // -------------------------------------------------------------
    let chats = {};
    let activeChatId = null;

    const chatHistoryList = document.getElementById('chat-history-list');
    const messagesContainer = document.getElementById('chat-messages-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // Load multiple chats list from localStorage
    function loadChats() {
      const storedChats = localStorage.getItem('pmd_gpt_chats');
      if (storedChats) {
        try {
          chats = JSON.parse(storedChats);
        } catch (e) {
          chats = {};
        }
      }
      
      const storedActiveId = localStorage.getItem('pmd_gpt_active_id');
      if (storedActiveId && chats[storedActiveId]) {
        activeChatId = storedActiveId;
      } else {
        const keys = Object.keys(chats);
        if (keys.length > 0) {
          activeChatId = keys[0];
        } else {
          activeChatId = null;
        }
      }
      
      renderSidebarHistory();
      renderActiveChat();
    }

    function saveChats() {
      localStorage.setItem('pmd_gpt_chats', JSON.stringify(chats));
      if (activeChatId) {
        localStorage.setItem('pmd_gpt_active_id', activeChatId);
      } else {
        localStorage.removeItem('pmd_gpt_active_id');
      }
    }

    // Generate unique conversation identifiers
    function generateUUID() {
      return 'chat_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    }

    // Format Timestamp HH:MM AM/PM
    function getFormattedTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      return `${hours}:${minutes} ${ampm}`;
    }

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Dynamic Sidebar History Render (ChatGPT style lists)
    function renderSidebarHistory() {
      chatHistoryList.innerHTML = '';
      const keys = Object.keys(chats).sort((a, b) => chats[b].timestamp - chats[a].timestamp);

      if (keys.length === 0) {
        chatHistoryList.innerHTML = `<div style="text-align:center; padding: 20px; font-size:12px; color:var(--text-muted);">No conversations yet</div>`;
        return;
      }

      // Grouping chats by timeframe (Today, Previous)
      const todayGroup = [];
      const olderGroup = [];
      const now = new Date();

      keys.forEach(id => {
        const chatDate = new Date(chats[id].timestamp);
        if (chatDate.toDateString() === now.toDateString()) {
          todayGroup.push(id);
        } else {
          olderGroup.push(id);
        }
      });

      if (todayGroup.length > 0) {
        const titleDiv = document.createElement('div');
        titleDiv.className = 'history-group-title';
        titleDiv.textContent = 'Today';
        chatHistoryList.appendChild(titleDiv);
        
        todayGroup.forEach(id => appendHistoryItemElement(id));
      }

      if (olderGroup.length > 0) {
        const titleDiv = document.createElement('div');
        titleDiv.className = 'history-group-title';
        titleDiv.textContent = 'Previous Chats';
        chatHistoryList.appendChild(titleDiv);
        
        olderGroup.forEach(id => appendHistoryItemElement(id));
      }
    }

    // Append single chat bubble node to history list
    function appendHistoryItemElement(id) {
      const chat = chats[id];
      const itemDiv = document.createElement('div');
      itemDiv.className = `history-item ${id === activeChatId ? 'active' : ''}`;
      itemDiv.setAttribute('data-id', id);

      itemDiv.innerHTML = `
        <div class="history-item-left">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

          </button>
        </div>
      `;

      // Click to switch chat
      itemDiv.addEventListener('click', (e) => {
        if (e.target.closest('.history-item-actions') || e.target.closest('input')) return;
        switchActiveChat(id);
      });

      // Delete chat event
      const deleteBtn = itemDiv.querySelector('.delete-btn');
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm("Are you sure you want to delete this conversation?")) {
          deleteChat(id);
        }
      });

      // Rename chat event
      const editBtn = itemDiv.querySelector('.edit-btn');
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        startRenameChat(id, itemDiv);
      });

      chatHistoryList.appendChild(itemDiv);

    // Start in-place renaming of a conversation history item
    function startRenameChat(id, itemDiv) {
      const leftContainer = itemDiv.querySelector('.history-item-left');
      const titleSpan = leftContainer.querySelector('.history-item-title');
      const oldTitle = titleSpan.textContent;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'history-item-input';
      input.value = oldTitle;

      leftContainer.replaceChild(input, titleSpan);
      input.focus();
      input.select();

      function finishRename() {
        const newTitle = input.value.trim() || oldTitle;
        chats[id].title = newTitle;
        saveChats();
        renderSidebarHistory();
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          finishRename();
        }
        if (e.key === 'Escape') {
          renderSidebarHistory();
        }
      });

      input.addEventListener('blur', finishRename);
    }

    function switchActiveChat(id) {
      activeChatId = id;

      renderSidebarHistory();
      renderActiveChat();
      closeSidebarMobile();
      playSynthSound('tap');
    }

    function deleteChat(id) {
      delete chats[id];
      if (activeChatId === id) {
        const keys = Object.keys(chats);
        activeChatId = keys.length > 0 ? keys[0] : null;
      }
      saveChats();
      renderSidebarHistory();
      renderActiveChat();

    // HTML-Safe character-by-character typist
    function streamHTML(element, html, callback) {
      let index = 0;
      element.innerHTML = '';
      element.classList.add('streaming-text');
      
      function typeChar() {
        if (index < html.length) {
          if (html[index] === '<') {
            // Instantly load raw html structural nodes to avoid typing artifacts
            let tagEnd = html.indexOf('>', index);
            if (tagEnd !== -1) {
              element.innerHTML += html.substring(index, tagEnd + 1);
              index = tagEnd + 1;
            } else {
              element.innerHTML += html[index];
              index++;
            }
          } else {
            element.innerHTML += html[index];
            index++;
          }
          scrollToBottom();
          // Streaming speed setup
          setTimeout(typeChar, 10 + Math.random() * 12);
        } else {
          element.classList.remove('streaming-text');
          if (callback) callback();
        }
      }
      
      typeChar();
    }

    function removeTypingRow() {
      const typingRow = document.getElementById('bot-typing-row');
      if (typingRow) {
        typingRow.remove();
      }
    }

    // Append helper quick-action suggestion chips inside chat thread
    function appendOptionChips(questions) {
      const rowInner = messagesContainer.lastElementChild.querySelector('.message-content-wrapper');
      if (!rowInner) return;
      
      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'chips-container';

      questions.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'chip-btn';
        btn.textContent = q;
        btn.addEventListener('click', () => {
          submitUserQuery(q);
          playSynthSound('tap');
        });
        chipsContainer.appendChild(btn);
      });

      rowInner.appendChild(chipsContainer);
      scrollToBottom();
    }

    // Send User input and match bot answer
    function submitUserQuery(text) {
      if (!text || text.trim() === '') return;

      // Reset textarea height
      chatInput.value = '';
      chatInput.style.height = '24px';
      sendBtn.disabled = true;

      // First check if we need to initialize a new conversation ID in localStorage
      let isFirstMessage = false;
      if (!activeChatId) {
        activeChatId = generateUUID();
        // Generate title based on first query
        const chatTitle = text.length > 25 ? text.substring(0, 22) + "..." : text;
        chats[activeChatId] = {
          id: activeChatId,
          title: chatTitle,
          timestamp: Date.now(),
          messages: []
        };
        isFirstMessage = true;
      }

      // 1. Render User message Row
      const nowTime = getFormattedTime();
      appendMessageRow('user', text, nowTime, false);
      chats[activeChatId].messages.push({ sender: 'user', text, timestamp: nowTime });
      chats[activeChatId].timestamp = Date.now();
      playSynthSound('send');

      // Update sidebar layout if first message
      if (isFirstMessage) {
        renderSidebarHistory();
      }

      // 2. Render Typing indicator
      appendTypingRow();

      // 3. Processing and delay
      const typingDelay = Math.random() * 500 + 700; // 0.7s - 1.2s delay
      
      setTimeout(() => {
        removeTypingRow();

        let answer = null;
        let matchedFaq = null;

        // NLP search logic: Check FAQ list first to resolve query expansion
        const matchResult = findBestFAQ(text);
        if (matchResult) {
          answer = matchResult.faq.answer;
          matchedFaq = matchResult.faq;
        } else {
          // If no FAQ matching, fall back to Conversational mapper (greetings, jokes, calculations)
          answer = getConversationalReply(text);
        }

        // If still no response found, apply ChatGPT helpful assistant response
        if (!answer) {
          answer = "I'm sorry, I couldn't find an exact match in my FAQ database for your question.\n\nAs an AI assistant, I can immediately assist you with:\n* **Business Hours** (When support is open)\n* **Customer Support Contact** (Email/Phone details)\n* **Returns & Refunds** (30-day window details)\n* **International Shipping** (Deliveries worldwide)\n* **Order Tracking** (How to locate orders)\n\nCould you please rephrase or choose one of the topics below?";
        }

        // 4. Render Bot answer Row (Streaming character-by-character)
        appendMessageRow('bot', answer, nowTime, true, () => {
          // Callback after stream finishes: append helper chips if fallback was shown
          if (!matchedFaq && !getConversationalReply(text)) {
            const suggestionQuestions = faqs.map(f => f.question);
            appendOptionChips(suggestionQuestions);
          }
        });
        
        // Save bot response to log
        chats[activeChatId].messages.push({ sender: 'bot', text: answer, timestamp: nowTime });
        saveChats();
        
        playSynthSound('reply');

      }, typingDelay);
    }

    // -------------------------------------------------------------
    // INPUT EVENT LISTENERS (Textarea dynamic resize)
    // -------------------------------------------------------------
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = (chatInput.scrollHeight - 6) + 'px';
      sendBtn.disabled = chatInput.value.trim() === '';
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const query = chatInput.value.trim();
        if (query.length > 0) {
          submitUserQuery(query);
        }
      }
    });

    sendBtn.addEventListener('click', () => {
      const query = chatInput.value.trim();
      submitUserQuery(query);
    });

    // -------------------------------------------------------------
    // MOBILE DRAWER SYSTEM
    // -------------------------------------------------------------
    function openSidebarMobile() {
      sidebar.classList.add('sidebar-open');
      sidebarOverlay.classList.add('active');
    }

    function closeSidebarMobile() {
      sidebar.classList.remove('sidebar-open');
      sidebarOverlay.classList.remove('active');
    }

    menuToggleBtn.addEventListener('click', openSidebarMobile);
    mobileCloseBtn.addEventListener('click', closeSidebarMobile);
    sidebarOverlay.addEventListener('click', closeSidebarMobile);

    // Initialize application settings on launch
    window.addEventListener('DOMContentLoaded', () => {
      updateThemeToggleElements();
      updateAudioToggleButton();
      loadChats();
    });

  </script>
