<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMD AI TRANSLATOR - Premium Language Translation Tool</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Animated Gradient Shapes -->
    <div class="bg-gradient-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-language"></i>
                </div>
                <h1>PMD AI <span>TRANSLATOR</span></h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme (Coming Soon)">
                    <i class="fa-solid fa-circle-half-stroke"></i>
                </button>
                <button id="open-history-btn" class="action-btn header-btn">
                    <i class="fa-solid fa-history"></i>
                    <span>History & Saved</span>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="main-content">
            <div class="translator-card">
                <!-- Source Panel -->
                <div class="panel source-panel">
                    <div class="panel-header">
                        <span class="panel-title">From</span>
                        
                        <!-- Custom Select Source Language -->
                        <div class="custom-select-container" id="source-select">
                            <div class="select-trigger">
                                <span class="selected-text">Auto Detect</span>
                                <i class="fa-solid fa-chevron-down arrow"></i>
                            </div>
                            <div class="select-dropdown">
                                <div class="search-box">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input type="text" placeholder="Search languages..." class="select-search-input">
                                    <button class="clear-search-btn" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <ul class="select-options">
                                    <!-- Dynamic list of options loaded from languages.js -->
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="textarea-wrapper">
                        <textarea id="source-textarea" placeholder="Type or paste text here to translate... (e.g., Hello, how are you?)" maxlength="5000"></textarea>
                        <button id="clear-text-btn" class="clear-text-btn hidden" title="Clear text">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div class="panel-footer">
                        <div class="footer-left">
                            <button id="voice-input-btn" class="tool-btn" title="Voice Input (Speech to Text)">
                                <i class="fa-solid fa-microphone"></i>
                                <span class="pulse-ring"></span>
                            </button>
                            <button id="source-speak-btn" class="tool-btn" title="Listen text">
                                <i class="fa-solid fa-volume-high"></i>
                            </button>
                        </div>
                        <div class="footer-right">
                            <span id="char-counter" class="char-counter">0 / 5000</span>
                        </div>
                    </div>
                </div>

                <!-- Center Swap & Translate Controls -->
                <div class="center-controls">
                    <button id="swap-languages-btn" class="swap-btn" title="Swap languages">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i>
                    </button>
                    <button id="translate-trigger-btn" class="translate-btn">
                        <span>Translate</span>
                        <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </div>

                <!-- Target Panel -->
                <div class="panel target-panel">
                    <div class="panel-header">
                        <span class="panel-title">To</span>
                        
                        <!-- Custom Select Target Language -->
                        <div class="custom-select-container" id="target-select">
                            <div class="select-trigger">
                                <span class="selected-text">Spanish</span>
                                <i class="fa-solid fa-chevron-down arrow"></i>
                            </div>
                            <div class="select-dropdown">
                                <div class="search-box">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input type="text" placeholder="Search languages..." class="select-search-input">
                                    <button class="clear-search-btn" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <ul class="select-options">
                                    <!-- Dynamic list of options loaded from languages.js -->
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="textarea-wrapper target-wrapper">
                        <div class="shimmer-overlay hidden" id="target-shimmer">
                            <div class="shimmer-line line-1"></div>
                            <div class="shimmer-line line-2"></div>
                            <div class="shimmer-line line-3"></div>
                        </div>
                        <textarea id="target-textarea" placeholder="Translation will appear here..." readonly></textarea>
                    </div>

                    <div class="panel-footer">
                        <div class="footer-left">
                            <button id="target-speak-btn" class="tool-btn" title="Listen translation">
                                <i class="fa-solid fa-volume-high"></i>
                            </button>
                            <button id="copy-btn" class="tool-btn" title="Copy to clipboard">
                                <i class="fa-solid fa-copy"></i>
                            </button>
                            <button id="favorite-btn" class="tool-btn" title="Save translation">
                                <i class="fa-regular fa-star"></i>
                            </button>
                        </div>
                        <div class="footer-right">
                            <span id="detected-badge" class="detected-badge hidden">Detected: English</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer-bar">
            <p>&copy; 2026 PMD AI TRANSLATOR. Powered by Advanced Neural Models.</p>
        </footer>
    </div>

    <!-- History / Saved Drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="history-drawer">
        <div class="drawer-header">
            <h3><i class="fa-solid fa-history"></i> Translations</h3>
            <button id="close-drawer-btn" class="close-btn" title="Close Drawer">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="drawer-tabs">
            <button class="tab-btn active" data-tab="history">Recent History</button>
            <button class="tab-btn" data-tab="favorites">Saved (Starred)</button>
        </div>

        <div class="drawer-content">
            <div class="tab-panel active" id="history-panel">
                <div class="panel-actions">
                    <button id="clear-history-btn" class="text-action-btn">
                        <i class="fa-solid fa-trash-can"></i> Clear History
                    </button>
                </div>
                <ul class="drawer-list" id="history-list">
                    <!-- Dynamic history items -->
                </ul>
                <div class="empty-state" id="history-empty">
                    <i class="fa-regular fa-folder-open"></i>
                    <p>No recent translations yet.</p>
                </div>
            </div>

            <div class="tab-panel" id="favorites-panel">
                <div class="panel-actions">
                    <button id="clear-favorites-btn" class="text-action-btn">
                        <i class="fa-solid fa-trash-can"></i> Clear Saved
                    </button>
                </div>
                <ul class="drawer-list" id="favorites-list">
                    <!-- Dynamic saved items -->
                </ul>
                <div class="empty-state" id="favorites-empty">
                    <i class="fa-regular fa-star"></i>
                    <p>No saved translations yet. Star translation results to save them.</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Voice Input Equalizer Overlay -->
    <div class="voice-overlay hidden" id="voice-overlay">
        <div class="voice-card">
            <div class="voice-waves">
                <div class="wave wave-1"></div>
                <div class="wave wave-2"></div>
                <div class="wave wave-3"></div>
                <div class="wave wave-4"></div>
                <div class="wave wave-5"></div>
            </div>
            <p class="voice-status">Listening... Speak now.</p>
            <button id="stop-voice-btn" class="stop-btn">
                <i class="fa-solid fa-microphone-slash"></i> Stop Listening
            </button>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Application Script dependencies -->
    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
